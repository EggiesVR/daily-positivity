<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Spark</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
            font-family: sans-serif;
            text-align: center;
        }
        #card {
            padding: 40px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 400px;
        }
        h1 { color: #555; font-size: 1.4rem; margin-bottom: 30px; min-height: 60px; }
        button {
            background: #ff8a80;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="card">
        <h1 id="message">Press the button for magic!</h1>
        <button onclick="showMagic()">New Positivity Note</button>
    </div>

    <script>
        const quotes = [
            "You are awesome!",
            "Keep going, you're doing great.",
            "Today is going to be a good day.",
            "You've got this!",
            "Believe in yourself.",
            "Make today amazing."
        ];

        function showMagic() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('message').innerText = randomQuote;
        }

        // This makes it show a message immediately when the page opens
        window.onload = showMagic;
    </script>

</body>
</html>
